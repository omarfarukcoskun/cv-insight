# CV Insight — Application Configuration
# ----------------------------------------
# Set your Anthropic API key here OR via the ANTHROPIC_API_KEY environment variable.
# Environment variable takes priority over this file.
#
# Get your key at: https://console.anthropic.com/

anthropic.api.key=YOUR_API_KEY_HERE

# Claude model to use for CV analysis
claude.model=claude-sonnet-4-6

# Max tokens in Claude's response (1024 is enough for structured JSON feedback)
claude.max_tokens=1024
